name: Release Plugins

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Set binary extension
        id: ext
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            echo "bin_ext=.exe" >> "$GITHUB_OUTPUT"
            echo "archive_ext=zip" >> "$GITHUB_OUTPUT"
          else
            echo "bin_ext="      >> "$GITHUB_OUTPUT"
            echo "archive_ext=tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Plugins
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          make build BIN_EXT=${{ steps.ext.outputs.bin_ext }}

      - name: Prepare distribution
        run: |
          mkdir -p dist/plugin-os dist/plugin-axios-mitigation dist/plugin-axios-github-scan
          cp plugin-os/plugin-os${{ steps.ext.outputs.bin_ext }} dist/plugin-os/
          cp plugin-os/plugin.yaml dist/plugin-os/
          cp plugin-axios-mitigation/plugin-axios-mitigation${{ steps.ext.outputs.bin_ext }} dist/plugin-axios-mitigation/
          cp plugin-axios-mitigation/plugin.yaml dist/plugin-axios-mitigation/
          cp -r plugin-axios-github-scan/src dist/plugin-axios-github-scan/
          cp plugin-axios-github-scan/plugin.yaml dist/plugin-axios-github-scan/
          cp plugin-axios-github-scan/pyproject.toml dist/plugin-axios-github-scan/
          cp plugin-axios-github-scan/uv.lock dist/plugin-axios-github-scan/

      - name: Create Archive (tar.gz)
        if: matrix.os != 'windows'
        run: |
          ARCHIVE="ztvs-plugins-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$ARCHIVE" -C dist .
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create Archive (zip)
        if: matrix.os == 'windows'
        run: |
          ARCHIVE="ztvs-plugins-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.zip"
          cd dist && zip -r "../$ARCHIVE" . && cd ..
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ztvs-plugins-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ASSET }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
