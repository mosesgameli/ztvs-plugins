name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout 5m

  test:
    name: Test (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [plugin-os, plugin-axios-mitigation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test -v ./...
        working-directory: ${{ matrix.plugin }}
