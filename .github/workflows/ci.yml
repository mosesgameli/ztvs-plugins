name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [plugin-os, plugin-axios-mitigation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.4

      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m
        working-directory: ${{ matrix.plugin }}

  test:
    name: Test (${{ matrix.plugin }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        plugin: [plugin-os, plugin-axios-mitigation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test -v ./...
        working-directory: ${{ matrix.plugin }}

  python-test:
    name: Python CI (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [plugin-axios-github-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Lint (Ruff)
        run: uv run ruff check .
        working-directory: ${{ matrix.plugin }}

      - name: Handshake Test
        run: |
          echo '{"jsonrpc": "2.0", "id": "1", "method": "handshake", "params": {}}' | uv run python -m src.plugin_axios_github_scan.main
        working-directory: ${{ matrix.plugin }}
