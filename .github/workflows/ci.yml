name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [plugin-os, plugin-axios-mitigation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.4

      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m
        working-directory: ${{ matrix.plugin }}

  test:
    name: Test (${{ matrix.plugin }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        plugin: [plugin-os, plugin-axios-mitigation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test -v ./...
        working-directory: ${{ matrix.plugin }}
